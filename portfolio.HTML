<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Portfolio Web Page </title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f172a, #020617);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #e5e7eb;
    }

    .profile-card {
      background: #020617;
      padding: 40px;
      border-radius: 20px;
      width: 320px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      animation: fadeIn 1.2s ease;
    }

    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #38bdf8;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
    }

    h3 {
      font-size: 16px;
      font-weight: 400;
      color: #38bdf8;
      margin-top: 5px;
    }

    p {
      font-size: 14px;
      color: #94a3b8;
      margin: 10px 0 20px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .btn {
      padding: 8px 18px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 14px;
      transition: 0.3s;
    }

    .primary {
      background: #38bdf8;
      color: #020617;
    }

    .outline {
      border: 1px solid #38bdf8;
      color: #38bdf8;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="profile-card">

    <!-- Replace profile.jpg with your image -->
    <img src="profile.jpg" alt="Profile Photo" class="profile-img">

    <h1>BHARATH KOWSHIK ULLANGULA</h1>
    <h3>Computer Science Student</h3>
    <p>Web Developer </p>

    <div class="buttons">
      <a href="#" class="btn primary">View Portfolio</a>
      <a href="#" class="btn outline">Contact Me</a>
    </div>

  </div>

</body>
</html>
